name: offline-smoke

on:
  push:
  pull_request:

jobs:
  offline-smoke:
    name: offline-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install openai networkx

      - name: Run offline smoke test
        run: cd metacypher && python ../examples/smoke_offline.py
